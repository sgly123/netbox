# Docker Compose - NetBox 核心服务架构
# 面试演示场景: Echo, Redis, WebSocket, IM服务

services:
  # Echo服务器
  netbox-echo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netbox-echo-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - netbox-network
    command: ["./NetBox", "config/config-echo.yaml"]

  # Redis服务器
  netbox-redis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netbox-redis-server
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - netbox-network
    command: ["./NetBox", "config/config-redis.yaml"]

  # WebSocket服务器
  netbox-websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netbox-websocket-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - netbox-network
    command: ["./NetBox", "config/config-websocket.yaml"]

  # IM即时通讯服务器
  netbox-im:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netbox-im-server
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - netbox-network
    command: ["./NetBox", "config/config-im.yaml"]


networks:
  netbox-network:
    driver: bridge
    name: netbox-network
