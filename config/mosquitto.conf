# Mosquitto MQTT Broker配置

# 监听端口
listener 1883
protocol mqtt

# WebSocket支持
listener 9001
protocol websockets

# 允许匿名连接（生产环境应禁用）
allow_anonymous true

# 日志配置
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# 持久化配置
persistence true
persistence_location /mosquitto/data/

# 自动保存间隔（秒）
autosave_interval 60

# 最大连接数
max_connections -1

# 消息大小限制（字节）
message_size_limit 0
