# NetBox Docker 默认配置文件
# 用于Docker容器默认启动配置

# 服务器基本信息
server:
  name: "NetBox Server"
  version: "1.0.0"
  description: "高性能网络服务器框架"

# 网络配置
network:
  ip: "0.0.0.0"
  port: 8888  # 默认使用Echo服务端口
  io_type: "epoll"
  max_connections: 2000

# 应用配置
application:
  type: ""  # 默认启动Echo服务
  version: "1.0.0"

# 线程配置
threading:
  worker_threads: 4

# 日志配置
logging:
  level: "info"
  file: "/app/logs/netbox-server.log"
  console: true
  async: true

# 性能配置
performance:
  buffer_size: 4096
  heartbeat_interval: 30

# Echo服务特定配置
echo:
  message_prefix: "NetBox Echo: "

# 插件配置
plugins:
  # UDP插件
  udp:
    enabled: true
    port: 8889
    buffer_size: 1024
  
  # TCP插件
  tcp:
    enabled: true
    port: 8890
    buffer_size: 4096

# 协议支持
protocols:
  # WebSocket协议
  websocket:
    enabled: false
    port: 8001
    max_frame_size: 65536
    enable_compression: false
  
  # Redis协议
  redis:
    enabled: false
    port: 6379
    max_memory: "50MB"
    enable_aof: true
  
  # IM协议
  im:
    enabled: false
    port: 9000
    max_users: 100000
    session_timeout: 3600
  
  # 心电设备协议
  ecg_device:
    enabled: false
    port: 8899
    sample_rate: 500

# 健康检查配置
health_check:
  enabled: true
  interval: 30
  timeout: 10
  retries: 3

# 监控配置
monitoring:
  enabled: true
  metrics_port: 9090
  collect_interval: 60

# 安全配置
security:
  # 连接限制
  connection_rate_limit: 100  # 每秒最大连接数
  max_requests_per_minute: 1000
  
  # IP白名单（空表示允许所有）
  ip_whitelist: []
  
  # IP黑名单
  ip_blacklist: []

# 数据持久化
data:
  # 数据目录
  path: "/app/data"
  
  # 日志保留策略
  log_retention_days: 7
  
  # 备份配置
  backup:
    enabled: true
    interval: 86400  # 24小时
    keep_count: 7

# 环境特定配置
environment:
  # Docker环境变量
  docker_mode: true
  
  # 时区设置
  timezone: "Asia/Shanghai"
  
  # 资源限制
  resource_limits:
    max_memory: "512MB"
    max_cpu: "1.0"

# 调试配置
debug:
  enabled: false
  level: "info"
  port: 9999
  
  # 性能分析
  profiling:
    enabled: false
    port: 6060
    interval: 60